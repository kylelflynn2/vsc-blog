{% extends "base.html" %}
{% block title %}Admin Setup · Kyle Flynn{% endblock %}

{% block extra_styles %}
<style>
    .setup-container {
        background: var(--navy);
        color: var(--white);
        min-height: calc(100vh - 64px);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem;
    }

    .setup-box {
        background: var(--white);
        color: var(--text-dark);
        padding: 3rem;
        border-radius: 4px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        max-width: 400px;
        width: 100%;
    }

    .setup-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .setup-icon {
        font-size: 2.5rem;
        margin-bottom: 1rem;
    }

    .setup-title {
        font-family: 'DM Serif Display', serif;
        font-size: 2rem;
        color: var(--navy);
        margin-bottom: 0.5rem;
    }

    .setup-subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-dark);
    }

    .form-group input {
        width: 100%;
        padding: 0.85rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    .setup-submit {
        width: 100%;
        background: var(--gold);
        color: var(--navy);
        padding: 0.85rem;
        border: none;
        border-radius: 4px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s;
    }

    .setup-submit:hover {
        background: var(--gold-light);
    }

    .error-message {
        background: #FADBD8;
        color: #A93226;
        padding: 0.75rem;
        border-radius: 4px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
        border-left: 4px solid #A93226;
    }

    .setup-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .setup-footer a {
        color: var(--gold);
        text-decoration: none;
        font-weight: 600;
    }

    .setup-footer a:hover {
        color: var(--gold-light);
    }
</style>
{% endblock %}

{% block content %}
<div class="setup-container">
    <div class="setup-box">
        <div class="setup-header">
            <div class="setup-icon">🔐</div>
            <h1 class="setup-title">Setup Admin</h1>
            <p class="setup-subtitle">Create your admin password</p>
        </div>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6" autofocus>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            <button type="submit" class="setup-submit">Create Admin Account</button>
        </form>

        <div class="setup-footer">
            <p><a href="/">Back to Home</a></p>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kyle Flynn{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">Kyle Flynn</a>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/blog" class="nav-link">Projects</a></li>
                <li><a href="/resume" class="nav-link">Resume</a></li>
                <li><a href="/connect" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="footer">
        <p>&copy; 2026 Kyle Flynn. All rights reserved.</p>
    </footer>
</body>
</html>
